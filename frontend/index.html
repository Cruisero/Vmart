<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png?v=2" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Vmart - 打造你的专属数字商城 | Build your digital storefront" />
  <meta name="keywords" content="Vmart,发卡,虚拟物品,自动发卡,卡密,充值,digital storefront" />
  <title>打造你的专属数字商城</title>
  <script>
    // 在页面渲染前立即应用保存的主题，避免闪烁
    (function () {
      try {
        var stored = localStorage.getItem('kashop-theme');
        if (stored) {
          var parsed = JSON.parse(stored);
          var theme = parsed.state && parsed.state.theme ? parsed.state.theme : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } else {
          // 默认使用浅色主题
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }

      // 如果是自定义域名，立即将标题设为域名，避免在接口加载完成前闪烁显示平台默认的“打造你的专属数字商城”
      try {
        var host = window.location.hostname;
        var mainDomains = ['localhost', '127.0.0.1', 'vmart.cc', 'www.vmart.cc', 'fallback.vmart.cc'];
        if (!mainDomains.includes(host)) {
          document.title = host;
        }
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
