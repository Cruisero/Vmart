server {
    listen 443 ssl default_server;
    http2 on;
    server_name vmart.cc www.vmart.cc fallback.vmart.cc;

    # 前端静态文件
    location / {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API 请求
    location /api {
        proxy_pass http://127.0.0.1:8084;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }

    # 上传文件代理到后端
    location /uploads {
        proxy_pass http://127.0.0.1:8084/uploads;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_valid 200 1d;
        expires 1d;
    }

    ssl_certificate /etc/letsencrypt/live/vmart.cc/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/vmart.cc/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80 default_server;
    server_name vmart.cc www.vmart.cc fallback.vmart.cc;

    # 重定向所有 HTTP 请求到 HTTPS
    return 301 https://$host$request_uri;
}
